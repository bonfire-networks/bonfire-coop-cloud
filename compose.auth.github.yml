version: "3.8"

services:
  app:
    environment:
      - GITHUB_APP_CLIENT_ID
      - GITHUB_CLIENT_SECRET_FILE=/run/secrets/github_client_secret
    secrets:
      - github_client_secret

secrets:
  oauth_client_secret:
    external: true
    name: ${STACK_NAME}_github_client_secret_${SECRET_GITHUB_CLIENT_SECRET_VERSION:-v1}
